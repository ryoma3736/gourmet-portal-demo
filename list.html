  {name:"イタリアン Grano",genre:"イタリアン",area:"九州・沖縄",station:"那覇",bmin:3500,blabel:"¥3,500〜",rating:4.4,reviews:142,kw:"pizza",lock:28,tags:[],hours:"11:30–22:00",open:true,catch:"島野菜のパスタと泡盛サングリア。"},
  {name:"居酒屋 北の宴",genre:"居酒屋",area:"北海道",station:"大通",bmin:3000,blabel:"¥3,000〜",rating:4.5,reviews:298,kw:"izakaya",lock:29,tags:[],hours:"17:00–24:00",open:true,catch:"海の幸と地酒。北の恵みを大皿で。"},
  {name:"懐石 花筏",genre:"和食・割烹",area:"中国・四国",station:"高松",bmin:9000,blabel:"¥9,000〜",rating:4.7,reviews:108,kw:"kaiseki",lock:30,tags:[],hours:"17:30–22:00",open:false,catch:"瀬戸内の旬を懐石仕立てで。記念日に。"},
  {name:"バル El Sol",genre:"フレンチ",area:"関東",station:"中目黒",bmin:4500,blabel:"¥4,500〜",rating:4.6,reviews:221,kw:"wine",lock:31,tags:["new"],hours:"18:00–翌1:00",open:true,catch:"立ち飲みから始まる夜。タパスとワイン。"},
  {name:"手打ち蕎麦 山帰来",genre:"蕎麦",area:"東北",station:"盛岡",bmin:1800,blabel:"¥1,800〜",rating:4.7,reviews:96,kw:"soba",lock:32,tags:[],hours:"11:00–15:00",open:false,catch:"挽きたて打ちたて。蕎麦三昧の昼下がり。"}
];

/* 各店に安定ID付与（お気に入り用） */
SHOPS.forEach(s=> s.id = GPFav.slug(s.name));

/* select 構築 */
const opt = (arr,first) => `<option value="">${first}</option>` + arr.map(a=>`<option>${a}</option>`).join('');
document.getElementById('fArea').innerHTML = opt(AREAS,'すべてのエリア');
document.getElementById('fGenre').innerHTML = opt(GENRES,'すべてのジャンル');
document.getElementById('hArea').innerHTML = '<option>エリア</option>'+AREAS.map(a=>`<option>${a}</option>`).join('');
document.getElementById('hGenre').innerHTML = '<option>ジャンル</option>'+GENRES.map(g=>`<option>${g}</option>`).join('');

/* 状態モデル */
const state = { kw:'', area:'', genre:'', budget:'', rating:0, open:false, sort:'recommend' };
let shown = 12;

const cardHTML = (s,eager) => `
  <a href="store.html" class="shop-card">
    <span class="sc-thumb media">${imgTag(s.kw,360,225,s.lock,s.name+'（'+s.genre+'）',eager)}
      ${s.tags.includes('hot')?'<span class="tag hot">人気</span>':s.tags.includes('new')?'<span class="tag new">NEW</span>':''}
      <span class="sc-save" role="button" tabindex="0" data-fav-id="${s.id}" aria-label="${s.name} をお気に入りに保存">${svgUse('i-bookmark')}</span></span>
    <span class="sc-body">
      <span class="sc-name">${s.name}</span>
      <span class="sc-meta"><span class="genre">${s.genre}</span><span class="sep">/</span>${s.area} ${s.station}駅</span>
      <span class="sc-catch">${s.catch}</span>
      <span class="sc-row">
        <span class="rating"><span class="stars" aria-hidden="true">${svgUse('i-star')}</span><b>${s.rating.toFixed(1)}</b><span class="rc tnum">(${s.reviews})</span></span>
        ${s.open?'<span class="open"><span class="dot-open" aria-hidden="true"></span>営業中</span>':'<span class="open" style="color:var(--ink-low)"><span class="dot-open" style="background:var(--ink-low)" aria-hidden="true"></span>営業時間外</span>'}
      </span>
      <span class="sc-foot"><span class="price">${s.blabel}</span><span class="hours tnum">${s.hours}</span></span>
    </span>
  </a>`;

function applyFilters(){
  let r = SHOPS.filter(s=>{
    if(state.kw){ const q=state.kw.toLowerCase();
      const hay=(s.name+s.genre+s.area+s.station+s.catch).toLowerCase();
      if(!hay.includes(q)) return false; }
    if(state.area && s.area!==state.area) return false;
    if(state.genre && s.genre!==state.genre) return false;
    if(state.rating && s.rating < state.rating) return false;
    if(state.open && !s.open) return false;
    if(state.budget){ const [lo,hi]=state.budget.split('-').map(Number); if(s.bmin<lo || s.bmin>hi) return false; }
    return true;
  });
  const sorters = {
    recommend:(a,b)=> (b.rating*Math.log10(b.reviews+10)) - (a.rating*Math.log10(a.reviews+10)),
    rating:(a,b)=> b.rating-a.rating || b.reviews-a.reviews,
    reviews:(a,b)=> b.reviews-a.reviews,
    budgetAsc:(a,b)=> a.bmin-b.bmin,
    budgetDesc:(a,b)=> b.bmin-a.bmin
  };
  r.sort(sorters[state.sort]||sorters.recommend);
  return r;
}

function render(){
  const r = applyFilters();
  document.getElementById('count').textContent = r.length;
  const grid=document.getElementById('results'), empty=document.getElementById('empty'), more=document.getElementById('btnMore');
  if(r.length===0){ grid.innerHTML=''; empty.hidden=false; more.hidden=true; }
  else { empty.hidden=true; const slice=r.slice(0,shown);
    grid.innerHTML = slice.map((s,i)=>cardHTML(s,i<6)).join('');
    more.hidden = r.length<=shown; GPFav.reflect(grid); }
  renderChips();
}

/* お気に入り保存（カードの保存マーク・クリック/キーボード） */
const resultsEl = document.getElementById('results');
resultsEl.addEventListener('click',e=>{
  const sv=e.target.closest('.sc-save[data-fav-id]'); if(!sv) return;
  e.preventDefault(); e.stopPropagation();
  const s=SHOPS.find(x=>x.id===sv.dataset.favId); if(!s) return;
  GPFav.toggle({id:s.id,name:s.name,genre:s.genre,area:s.area,station:s.station,rating:s.rating,reviews:s.reviews,kw:s.kw,lock:s.lock,blabel:s.blabel});
  GPFav.reflect(resultsEl);
});
resultsEl.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ') && e.target.closest('.sc-save[data-fav-id]')){ e.preventDefault(); e.target.click(); }
});

function renderChips(){
  const box=document.getElementById('chips'); const c=[];
  if(state.kw) c.push(['kw','「'+state.kw+'」']);
  if(state.area) c.push(['area',state.area]);
  if(state.genre) c.push(['genre',state.genre]);
  if(state.budget) c.push(['budget',document.querySelector('#fBudget option[value="'+state.budget+'"]').textContent]);
  if(state.rating) c.push(['rating','★'+state.rating+'以上']);
  if(state.open) c.push(['open','営業中のみ']);
  box.innerHTML = c.map(([k,l])=>`<span class="chip">${l}<button type="button" data-k="${k}" aria-label="${l} を解除">×</button></span>`).join('');
  document.getElementById('clearAll').hidden = c.length===0;
}

/* イベント */
const bind=(id,ev,fn)=>document.getElementById(id).addEventListener(ev,fn);
bind('fKw','input',e=>{state.kw=e.target.value.trim();shown=12;render();});
bind('fArea','change',e=>{state.area=e.target.value;shown=12;render();});
bind('fGenre','change',e=>{state.genre=e.target.value;shown=12;render();});
bind('fBudget','change',e=>{state.budget=e.target.value;shown=12;render();});
bind('fRating','change',e=>{state.rating=parseFloat(e.target.value)||0;shown=12;render();});
bind('fOpen','change',e=>{state.open=e.target.checked;shown=12;render();});
bind('fSort','change',e=>{state.sort=e.target.value;render();});
bind('btnMore','click',()=>{shown+=9;render();});
bind('clearAll','click',()=>{Object.assign(state,{kw:'',area:'',genre:'',budget:'',rating:0,open:false});
  ['fKw'].forEach(i=>document.getElementById(i).value='');
  ['fArea','fGenre','fBudget'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fRating').value='0'; document.getElementById('fOpen').checked=false; shown=12; render();});
document.getElementById('chips').addEventListener('click',e=>{const b=e.target.closest('button[data-k]');if(!b)return;
  const k=b.dataset.k;
  if(k==='kw'){state.kw='';document.getElementById('fKw').value='';}
  else if(k==='area'){state.area='';document.getElementById('fArea').value='';}
  else if(k==='genre'){state.genre='';document.getElementById('fGenre').value='';}
  else if(k==='budget'){state.budget='';document.getElementById('fBudget').value='';}
  else if(k==='rating'){state.rating=0;document.getElementById('fRating').value='0';}
  else if(k==='open'){state.open=false;document.getElementById('fOpen').checked=false;}
  shown=12;render();});

/* URLクエリ初期化（TOPやカテゴリから ?genre=寿司&area=関東 で着地できる） */
(function initFromQuery(){
  const p=new URLSearchParams(location.search);
  if(p.get('kw')){state.kw=p.get('kw');document.getElementById('fKw').value=state.kw;}
  if(p.get('area') && AREAS.includes(p.get('area'))){state.area=p.get('area');document.getElementById('fArea').value=state.area;}
  if(p.get('genre') && GENRES.includes(p.get('genre'))){state.genre=p.get('genre');document.getElementById('fGenre').value=state.genre;}
})();

render();
addEventListener('load',()=>document.body.classList.add('imgs-ready'));
</script>
</body>
</html>
