<style>
.crumb { font-size: 12px; color: var(--ink-mid); padding: 16px 0 2px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.crumb a:hover { color: var(--cta); } .crumb .sep { color: var(--ink-low); } .crumb .cur { color: var(--ink); font-weight: 700; }
.fav-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin: 6px 0 22px; }
.fav-head h1 { font-family: var(--f-display); font-weight: 800; font-size: clamp(24px,3vw,36px); color: var(--ink); display:flex; align-items:center; gap:10px; }
.fav-head h1 svg { width: 26px; height: 26px; fill: var(--cta); }
.fav-head .count { font-size: 14px; color: var(--ink-mid); } .fav-head .count b { font-family: var(--f-latin); font-weight: 800; color: var(--accent-text); font-size: 20px; }
.fav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gutter); margin: 0 0 70px; }
.fav-card { position: relative; }
.fav-remove { position: absolute; right: 10px; top: 10px; z-index: 3; width: 36px; height: 36px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.94); color: var(--cta); cursor: pointer; box-shadow: var(--sh-sm); display: grid; place-items: center; transition: transform var(--t-fast), background var(--t-fast); }
.fav-remove svg { width: 18px; height: 18px; fill: currentColor; }
.fav-remove:hover { transform: scale(1.08); background: var(--cta); color: #fff; }
.empty { text-align: center; padding: 80px 20px 90px; color: var(--ink-mid); }
.empty .e-ico { width: 60px; height: 60px; margin: 0 auto 18px; color: var(--ink-low); }
.empty .e-ico svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 1.4; stroke-linejoin: round; }
.empty h3 { font-family: var(--f-display); font-weight: 700; font-size: 21px; color: var(--ink); margin-bottom: 8px; }
.empty p { margin-bottom: 22px; }
.empty .btn-cta { display: inline-flex; }
@media (max-width: 900px) { .fav-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .fav-grid { grid-template-columns: 1fr; } }
</style>
</head>

  <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/></symbol>
  <symbol id="i-fire" viewBox="0 0 24 24"><path d="M12 2c2.4 4 1.2 6.4-.5 8.2-1.5 1.6-2.7 3.4-1.3 5.6.6-1 1.4-1.7 2.1-2.2-.3 1.6.2 2.7 1 3.6 1.9-1.8 3-4.1 3-6.8C16 14.6 18 17 18 19.5 18 23 15.3 25 12 25S6 23 6 19.5C6 13.8 11 11 12 2Z"/></symbol>

<script src="favorites.js"></script>
<script>
const U = { ramen:'1569718212165-3a8278d5f624', barbecue:'1529692236671-f1f6cf9683ba', sushi:'1583623025817-d180a2221d0a',
  steak:'1546964124-0cce460f38ef', pizza:'1513104890138-7c749659a591', coffee:'1495474472287-4d71bcdd2085',
  izakaya:'1517248135467-4c7edcad34c4', dumpling:'1496116218417-1a781b1c416c', soba:'1612929633738-8fe44f7ec841',
  kaiseki:'1580822184713-fc5400e7fe10', wine:'1510812431401-41d2bd2722f3', tempura:'1606491956689-2ea866880c84' };
const key = kw => (kw||'').split(',')[0];
const uURL=(kw,w,h)=>U[key(kw)]?`https://images.unsplash.com/photo-${U[key(kw)]}?auto=format&fit=crop&w=${w}&h=${h}&q=80`:'';
const lURL=(kw,w,h,lock)=>`https://loremflickr.com/${w}/${h}/${key(kw)},food?lock=${lock||1}`;
const svgUse=id=>`<svg aria-hidden="true"><use href="#${id}"/></svg>`;

function render(){
  const items = GPFav.all();
  document.getElementById('favCount').textContent = items.length;
  const grid=document.getElementById('favGrid'), empty=document.getElementById('favEmpty');
  if(!items.length){ grid.innerHTML=''; empty.hidden=false; return; }
  empty.hidden=true;
  grid.innerHTML = items.map(s=>{
    const u=uURL(s.kw,360,225), l=lURL(s.kw,360,225,s.lock);
    const img=`<img class="ph cover" src="${u||l}" width="360" height="225" alt="${s.name}" loading="lazy"${u?` onerror="this.onerror=null;this.src='${l}'"`:''}>`;
    return `<div class="fav-card">
      <button class="fav-remove" type="button" data-id="${s.id}" aria-label="${s.name} をお気に入りから削除">${svgUse('i-bookmark-x')}</button>
      <a href="store.html" class="shop-card">
        <span class="sc-thumb media">${img}</span>
        <span class="sc-body">
          <span class="sc-name">${s.name}</span>
          <span class="sc-meta"><span class="genre">${s.genre}</span><span class="sep">/</span>${s.area}${s.station?' '+s.station+'駅':''}</span>
          <span class="sc-row">
            <span class="rating"><span class="stars" aria-hidden="true">${svgUse('i-star')}</span><b>${(+s.rating).toFixed(1)}</b>${s.reviews?`<span class="rc tnum">(${s.reviews})</span>`:''}</span>
            ${s.blabel?`<span class="price" style="font-weight:700;font-size:13px;color:var(--ink)">${s.blabel}</span>`:''}
          </span>
        </span>
      </a></div>`;
  }).join('');
}
document.getElementById('favGrid').addEventListener('click',e=>{
  const b=e.target.closest('.fav-remove'); if(!b) return;
  GPFav.remove(b.dataset.id); render();
});
document.addEventListener('gpfav:change', render);
render();
addEventListener('load',()=>document.body.classList.add('imgs-ready'));
</script>
</body>
